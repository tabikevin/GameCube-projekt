<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Belépés - GameCube</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="assets/css/main.css">
    <link rel="stylesheet" href="assets/css/admin-login.css">
</head>
<body class="admin-login-page">
    <div class="admin-login-box text-center">
        <a href="index.html" class="text-decoration-none text-light d-inline-flex align-items-center mb-3">
            <span class="gc-logo-square me-2"></span>
            <span class="h5 mb-0">GameCube</span>
        </a>
        <div class="mb-3">
            <i class="bi bi-shield-lock admin-login-icon"></i>
        </div>
        <h2 class="h4 text-light mb-1">Admin Panel</h2>
        <p class="text-light-50 mb-4">Belépés szükséges</p>

        <div id="adminError" class="alert admin-error mb-3"></div>

        <form id="adminLoginForm">
            <input type="password" id="adminPassword" class="form-control mb-3" placeholder="Admin jelszó" required autofocus>
            <button type="submit" class="btn btn-admin w-100 mb-3">
                <i class="bi bi-box-arrow-in-right me-1"></i> Belépés
            </button>
        </form>
        <a href="index.html" class="text-light-50 text-decoration-none">
            <i class="bi bi-arrow-left me-1"></i>Vissza a főoldalra
        </a>
    </div>

    <script src="assets/js/admin-auth.js?v=fix3"></script>
    <script>initAdminLogin();</script>
</body>
</html>
