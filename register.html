<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regisztráció - GameCube</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Sora:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="assets/css/main.css">
    <style>
        .doc-container {
            background: rgba(139, 92, 246, 0.05);
            border: 1px solid rgba(168, 85, 247, 0.2);
            border-radius: 16px;
            padding: 2.5rem;
        }
        .doc-title { font-family: 'Orbitron', sans-serif; font-weight: 900; text-shadow: 0 0 30px rgba(168, 85, 247, 0.6); }
        .gc-input { background: rgba(139,92,246,0.08) !important; border: 1px solid rgba(168,85,247,0.25) !important; color: #f1f5f9 !important; border-radius: 10px !important; }
        .gc-input:focus { border-color: rgba(168,85,247,0.6) !important; box-shadow: 0 0 0 3px rgba(168,85,247,0.15) !important; }
        .gc-input::placeholder { color: #64748b !important; }
        .form-label { color: #94a3b8; font-size: 0.9rem; }
        .form-text { color: #64748b !important; font-size: 0.8rem; }
        .btn-purple { background: linear-gradient(135deg, #a855f7, #7c3aed); border: none; color: #fff; border-radius: 10px; font-weight: 600; width: 100%; padding: 0.75rem; }
        .btn-purple:hover { opacity: 0.88; color: #fff; }
        .divider { border-top: 1px solid rgba(168,85,247,0.15); margin: 1.5rem 0 1.2rem; }
    </style>
</head>
<body>
    <header class="gc-header py-3 sticky-top">
        <div class="container">
            <div class="d-flex align-items-center justify-content-between flex-wrap">
                <a href="index.html" class="text-decoration-none text-light d-flex align-items-center">
                    <span class="gc-logo-square me-2"></span>
                    <h1 class="h4 mb-0">GameCube</h1>
                </a>
                <nav class="d-flex align-items-center gap-3 mt-2 mt-md-0">
                    <span id="userGreeting" class="text-light d-none"></span>
                    <div id="profileNavItem" class="d-none">
                        <a href="profile.html" class="btn btn-outline-light btn-sm"><i class="bi bi-person"></i> Profil</a>
                    </div>
                    <div id="adminNavItem" class="d-none">
                        <a href="admin.html" class="btn btn-outline-warning btn-sm"><i class="bi bi-shield-check"></i> Admin</a>
                    </div>
                    <a href="cart.html" class="btn btn-outline-light btn-sm position-relative">
                        <i class="bi bi-cart3"></i> Kosár
                        <span id="cartBadge" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" style="display:none;">0</span>
                    </a>
                    <div id="authButtons">
                        <a href="login.html" class="btn btn-outline-light btn-sm">Bejelentkezés</a>
                        <a href="register.html" class="btn gc-btn-main btn-sm">Regisztráció</a>
                    </div>
                    <button id="logoutBtn" class="btn btn-outline-danger btn-sm" style="display:none;">Kilépés</button>
                </nav>
            </div>
        </div>
    </header>

    <section class="py-5">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-6 col-lg-5">
                    <div class="text-center mb-4">
                        <h1 class="doc-title h2 text-white mb-1">Regisztráció</h1>
                        <p style="color:#64748b;">Hozz létre egy GameCube fiókot</p>
                    </div>

                    <div class="doc-container">
                        <div id="errorMessage" class="mb-3 p-3" style="display:none; background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.3); color:#f87171; border-radius:10px;"></div>

                        <form id="registerForm">
                            <div class="mb-3">
                                <label for="full_name" class="form-label">Teljes név</label>
                                <input type="text" class="form-control gc-input" id="full_name" name="full_name" required>
                            </div>
                            <div class="mb-3">
                                <label for="username" class="form-label">Felhasználónév</label>
                                <input type="text" class="form-control gc-input" id="username" name="username" required minlength="3">
                                <div class="form-text">Legalább 3 karakter</div>
                            </div>
                            <div class="mb-3">
                                <label for="email" class="form-label">E-mail cím</label>
                                <input type="email" class="form-control gc-input" id="email" name="email" required>
                            </div>
                            <div class="mb-3">
                                <label for="phone" class="form-label">Telefonszám <span style="color:#64748b;">(opcionális)</span></label>
                                <input type="text" class="form-control gc-input" id="phone" name="phone">
                            </div>
                            <div class="mb-3">
                                <label for="password" class="form-label">Jelszó</label>
                                <input type="password" class="form-control gc-input" id="password" name="password" required minlength="6">
                                <div class="form-text">Legalább 6 karakter</div>
                            </div>
                            <div class="mb-4">
                                <label for="password_confirm" class="form-label">Jelszó megerősítése</label>
                                <input type="password" class="form-control gc-input" id="password_confirm" name="password_confirm" required>
                            </div>
                            <button type="submit" class="btn btn-purple mb-2">
                                <i class="bi bi-person-plus me-2"></i>Regisztráció
                            </button>
                        </form>

                        <div class="divider"></div>
                        <p class="text-center mb-2" style="color:#64748b; font-size:0.9rem;">Már van fiókod?</p>
                        <a href="login.html" class="btn btn-outline-light w-100">Bejelentkezés</a>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer class="gc-footer py-5">
        <div class="container">
            <div class="row g-4">
                <div class="col-md-6">
                    <div class="d-flex align-items-center mb-3">
                        <span class="gc-logo-square me-2"></span>
                        <h5 class="mb-0 text-white">GameCube</h5>
                    </div>
                    <p class="text-light-50 mb-0"><i class="bi bi-c-circle me-1"></i>2026 GameCube<br>Digitális játék kulcsok azonnali kézbesítéssel</p>
                </div>
                <div class="col-md-6">
                    <h6 class="text-white mb-3">Hasznos linkek</h6>
                    <div class="gc-footer-links-grid">
                        <a href="aszf.html" class="gc-footer-link-card"><i class="bi bi-file-earmark-text"></i><span>ÁSZF</span></a>
                        <a href="adatkezeles.html" class="gc-footer-link-card"><i class="bi bi-shield-check"></i><span>Adatkezelés</span></a>
                        <a href="kapcsolat.html" class="gc-footer-link-card"><i class="bi bi-envelope"></i><span>Kapcsolat</span></a>
                    </div>
                </div>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/auth.js?v=fix3"></script>
    <script src="assets/js/register.js?v=fix3"></script>
</body>
</html>
