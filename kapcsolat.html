<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kapcsolat – GameCube</title>
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body class="theme">
  <header class="site-header">
    <div class="brand">GameCube</div>
    <nav class="nav">
      <a href="index.html">Főoldal</a>
    </nav>
  </header>

  <main class="container">
    <h1>Kapcsolat</h1>
    <section class="card">
      <h2>Ügyfélszolgálat</h2>
      <p>Magyar nyelvű támogatás. Válaszidő: 24–48 óra munkanapokon.</p>
      <ul class="list">
        <li><strong>E-mail:</strong> support@gamecube.hu</li>
        <li><strong>Telefon:</strong> +36 1 234 5678</li>
        <li><strong>Cím:</strong> 7621 Pécs, ...</li>
      </ul>
    </section>

    <section class="card">
      <h2>Írj nekünk</h2>
      <form class="form" action="/send-message" method="post">
        <label>
          Név
          <input type="text" name="name" required />
        </label>
        <label>
          E-mail
          <input type="email" name="email" required />
        </label>
        <label>
          Üzenet
          <textarea name="message" rows="6" required></textarea>
        </label>
        <button type="submit" class="btn btn-primary">Küldés</button>
      </form>
    </section>
  </main>

  <footer class="site-footer">
    <div class="footer-links">
      <a href="aszf.html">ÁSZF</a>
      <a href="adatkezeles.html">Adatkezelés</a>
      <a href="kapcsolat.html">Kapcsolat</a>
    </div>
    <small>© 2025 GameCube – Digitális játék kulcsok</small>
  </footer>
</body>
</html>
